{% load static %}
<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Dividend Tracker{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://unpkg.com/htmx.org@1.9.12" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js" defer></script>
  <style>
    body { padding-top: 4.5rem; }
    .navbar-brand { font-weight: 600; }
    .stat-card .stat-value { font-size: 1.75rem; font-weight: 600; }
    .stat-card .stat-label { color: #6c757d; font-size: 0.85rem; text-transform: uppercase; }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg bg-dark navbar-dark fixed-top">
    <div class="container">
      <a class="navbar-brand" href="{% url 'dashboard' %}">Dividend Tracker</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="nav">
        <ul class="navbar-nav me-auto">
          <li class="nav-item"><a class="nav-link" href="{% url 'dashboard' %}">대시보드</a></li>
          <li class="nav-item"><a class="nav-link" href="{% url 'ticker_list' %}">종목</a></li>
          <li class="nav-item"><a class="nav-link" href="{% url 'holding_list' %}">보유</a></li>
          <li class="nav-item"><a class="nav-link" href="{% url 'dividend_list' %}">배당 이력</a></li>
          <li class="nav-item"><a class="nav-link" href="{% url 'projection_view' %}">월간 예상</a></li>
        </ul>
        <a class="btn btn-outline-light btn-sm" href="{% url 'ticker_add' %}">+ 종목 추가</a>
      </div>
    </div>
  </nav>

  <main class="container">
    {% if messages %}
      {% for message in messages %}
        <div class="alert alert-{{ message.tags|default:'info' }} alert-dismissible fade show" role="alert">
          {{ message }}
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
      {% endfor %}
    {% endif %}
    {% block content %}{% endblock %}
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
